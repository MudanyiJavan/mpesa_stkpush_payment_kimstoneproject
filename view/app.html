<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vanyaboro</title>
<link rel="stylesheet" href="app.css">

</head>
<body>
<div class="header">
    <h3>Jipange Maisha</h3>
</div>

<div class="content">
    <div class="payment">
        <h3>MPESA ToolKit</h3>
        <h4>Merry Go Round</h4>
        <select name="code" id="code">
            <option value="254">+254</option>
        </select>        
        <input type="number" placeholder="phone number" id="contact" required> <br> <br>
        <button type="button" id="button">prompt</button>
        <p id="progress"></p>
    </div> 
</div>

<!-- Loading Indicator -->
<div id="loading">Processing Payment...</div>

<script>
const code = document.getElementById("code")
const contact = document.getElementById("contact")
const btn = document.getElementById("button")
const progress = document.getElementById("progress")
const loading = document.getElementById("loading")

btn.addEventListener("click", () => {
    const phone = code.value + contact.value.trim();

    // Show loading indicator
    loading.style.display = "block";

    async function payment() {
        try {
            const fetchdata = await fetch("/contact", {
                method: "POST",
                headers: { "content-type": "application/json" },
                body: JSON.stringify({ contact: phone })
            });
            const response = await fetchdata.json();

            // Show backend response
            progress.textContent = response;
        } catch (err) {
            progress.textContent = "Error: " + err.message;
        } finally {
            // Hide loading indicator
            loading.style.display = "none";
        }
    }

    payment();
    contact.value = "";
});
</script>
</body>
</html>
